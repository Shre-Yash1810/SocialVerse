<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Pacifico&family=Space+Mono:wght@400;700&family=Anton&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="error-overlay" style="position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:999999;font-family:monospace;white-space:pre-wrap;padding:20px;display:none;"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerHTML += e.error ? e.error.stack : e.message;
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerHTML += e.reason ? e.reason.stack : e.reason;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
